*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{

  --gold:#f0c040;--gold2:#ffe680;--cyan:#00d4ff;--violet:#b06aff;

  --gGold:0 0 10px rgba(240,192,64,.7),0 0 28px rgba(240,192,64,.25);

.btnArchive:hover{background:rgba(0,212,255,.12);box-shadow:var(--gCyan);transform:translateY(-1px)}

.page{max-width:1100px;margin:0 auto;padding:0 clamp(14px,4vw,52px) 100px}

.stage{perspective:1200px;perspective-origin:50% 38%;margin-bottom:36px}

.slotUnit{display:flex;flex-direction:column;align-items:center;gap:7px}
.slotLabel{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:var(--gold);text-shadow:var(--gGold)}
.slotSub{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;color:var(--dim)}
